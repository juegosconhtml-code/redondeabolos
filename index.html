<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bolera Matemática</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; }
        
        /* Marcador horizontal optimizado */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; justify-content: space-around; align-items: center;
            padding: 5px 0; border-bottom: 2px solid #4CAF50;
            z-index: 10;
        }
        .stat { font-size: 18px; font-weight: bold; }
        #pregunta { color: #ccff00; font-size: 20px; }
        #puntos { color: #00e5ff; }
    </style>
</head>
<body>

<div id="ui">
    <div id="pregunta" class="stat">Cargando...</div>
    <div id="puntos" class="stat">Puntos: 0</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const imgFondo = new Image(); imgFondo.src = 'fondo.jpg';
const imgBola = new Image(); imgBola.src = 'bola.png';
const imgBolo = new Image(); imgBolo.src = 'bolo.png';

let imagenesCargadas = 0;
let score = 0;
let gameState = 'IDLE'; 
let challenge = {};
let ball = { x: 0, y: 0, w: 140, h: 140, targetX: 0, speedY: 8 };

// Posiciones fijas de las 3 miras (Izquierda, Centro, Derecha)
const xMirasRel = [0.35, 0.5, 0.65]; 

function alCargarImagen() {
    if (++imagenesCargadas === 3) { resize(); draw(); }
}
imgFondo.onload = imgBola.onload = imgBolo.onload = alCargarImagen;

function initChallenge() {
    const tipos = ['unidades', 'décimas', 'centésimas'];
    const tipo = tipos[Math.floor(Math.random() * tipos.length)];
    let num, correct;

    if (tipo === 'unidades') {
        num = (Math.random() * 9 + 1).toFixed(1);
        correct = Math.round(parseFloat(num)).toString();
    } else if (tipo === 'décimas') {
        num = (Math.random() * 2).toFixed(2);
        correct = (Math.round(parseFloat(num) * 10) / 10).toFixed(1);
    } else {
        num = (Math.random() * 1).toFixed(3);
        correct = (Math.round(parseFloat(num) * 100) / 100).toFixed(2);
    }

    let ops = [correct];
    while(ops.length < 3) {
        let fake = (parseFloat(correct) + (Math.random() > 0.5 ? 0.1 : -0.1)).toFixed(tipo === 'unidades' ? 0 : (tipo === 'décimas' ? 1 : 2));
        if(!ops.includes(fake) && fake >= 0) ops.push(fake);
    }
    ops.sort(() => Math.random() - 0.5);

    challenge = { text: `Redondea ${num} a las ${tipo}`, correct: correct, options: ops };
    document.getElementById('pregunta').innerText = challenge.text;
    resetBall();
}

function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height * 0.9;
    ball.w = 140; ball.h = 140;
    gameState = 'IDLE';
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (imagenesCargadas === 3) initChallenge();
}

function draw() {
    if (imagenesCargadas < 3) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(imgFondo, 0, 0, canvas.width, canvas.height);

    // 1. Dibujar los 10 bolos en el centro (solo si no hay strike)
    if (gameState !== 'HIT') {
        const centroX = canvas.width * 0.5;
        const inicioY = canvas.height * 0.25;
        const bW = canvas.width * 0.03;
        const bH = bW * 2.2;
        
        // Formación triangular clásica (1, 2, 3, 4)
        let filaCount = 0;
        for (let i = 1; i <= 4; i++) {
            for (let j = 0; j < i; j++) {
                let x = centroX + (j * bW) - (i * bW / 2) + bW/2;
                let y = inicioY + (i * 12);
                ctx.drawImage(imgBolo, x - bW/2, y, bW, bH);
            }
        }
    }

    // 2. Dibujar las 3 miras y sus etiquetas
    xMirasRel.forEach((relX, i) => {
        const mx = canvas.width * relX;
        const my = canvas.height * 0.45;

        // Dibujar mira (círculo guía)
        ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(mx, my, 20, 0, Math.PI * 2);
        ctx.stroke();

        // Número debajo de la mira
        ctx.fillStyle = "#fff";
        ctx.font = "bold 22px Arial";
        ctx.textAlign = "center";
        ctx.fillText(challenge.options[i], mx, my + 45);
    });

    // 3. Dibujar Bola
    if (gameState !== 'HIT') {
        ctx.drawImage(imgBola, ball.x - ball.w/2, ball.y - ball.h/2, ball.w, ball.h);
    }

    update();
    requestAnimationFrame(draw);
}

function update() {
    if (gameState === 'ROLLING') {
        ball.y -= ball.speedY;
        ball.w = Math.max(25, ball.w - 1.2);
        ball.h = Math.max(25, ball.h - 1.2);
        ball.x += (ball.targetX - ball.x) * 0.07;

        // Verificar impacto en la línea de las miras
        if (ball.y <= canvas.height * 0.45) {
            const index = xMirasRel.map(r => canvas.width * r).indexOf(ball.targetX);
            if (challenge.options[index] == challenge.correct) {
                gameState = 'HIT';
                score += 10;
                document.getElementById('puntos').innerText = `Puntos: ${score}`;
                setTimeout(initChallenge, 1000);
            } else {
                gameState = 'GUTTER';
            }
        }
    }

    if (gameState === 'GUTTER') {
        ball.x += (ball.targetX < canvas.width * 0.5 ? -4 : 4);
        ball.y -= 3;
        ball.w *= 0.95; ball.h *= 0.95;
        if (ball.w < 5) {
            alert("¡Incorrecto! Era: " + challenge.correct);
            initChallenge();
        }
    }
}

function lanzar(e) {
    if (gameState !== 'IDLE') return;
    const rect = canvas.getBoundingClientRect();
    const cX = e.touches ? e.touches[0].clientX : e.clientX;
    const clickX = cX - rect.left;
    
    // Elegir la mira más cercana al clic
    const targets = xMirasRel.map(r => canvas.width * r);
    ball.targetX = targets.reduce((prev, curr) => 
        Math.abs(curr - clickX) < Math.abs(prev - clickX) ? curr : prev
    );

    gameState = 'ROLLING';
}

window.addEventListener('mousedown', lanzar);
window.addEventListener('touchstart', lanzar);
window.addEventListener('resize', resize);

</script>
</body>
</html>
