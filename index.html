<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bolera Matemática GitHub</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; margin: 0 auto; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; pointer-events: none; text-shadow: 2px 2px 8px #000;
        }
        .panel { 
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; 
            display: inline-block; border: 2px solid #4CAF50; min-width: 300px;
        }
        #pregunta { font-size: 32px; margin-bottom: 10px; color: #ccff00; }
        #opciones-texto { font-size: 22px; letter-spacing: 2px; }
        #puntos { font-size: 18px; margin-top: 10px; color: #00e5ff; }
    </style>
</head>
<body>

<div id="ui">
    <div class="panel">
        <div id="pregunta">Cargando imágenes...</div>
        <div id="opciones-texto"></div>
        <div id="puntos">Puntos: 0</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- CARGA DE IMÁGENES ---
const imgFondo = new Image();
const imgBola = new Image();
const imgBolo = new Image();

// IMPORTANTE: Asegúrate de que los nombres coincidan exactamente (mayúsculas/minúsculas)
imgFondo.src = 'fondo.jpg';
imgBola.src = 'bola.png';
imgBolo.src = 'bolo.png';

let imagenesCargadas = 0;
const totalImagenes = 3;

function alCargarImagen() {
    imagenesCargadas++;
    if (imagenesCargadas === totalImagenes) {
        resize();
        draw();
    }
}

imgFondo.onload = alCargarImagen;
imgBola.onload = alCargarImagen;
imgBolo.onload = alCargarImagen;

// --- VARIABLES DE JUEGO ---
let score = 0;
let gameState = 'IDLE'; 
let challenge = {};
let ball = { x: 0, y: 0, w: 140, h: 140, targetX: 0, speedY: 7 };
const xZonasRelativas = [0.25, 0.5, 0.75]; // Posiciones de los carriles

function initChallenge() {
    const tipos = ['unidades', 'décimas', 'centésimas'];
    const tipo = tipos[Math.floor(Math.random() * tipos.length)];
    let num, correct;

    if (tipo === 'unidades') {
        num = (Math.random() * 9 + 1).toFixed(1);
        correct = Math.round(parseFloat(num)).toString();
    } else if (tipo === 'décimas') {
        num = (Math.random() * 2).toFixed(2);
        correct = (Math.round(parseFloat(num) * 10) / 10).toFixed(1);
    } else {
        num = (Math.random() * 1).toFixed(3);
        correct = (Math.round(parseFloat(num) * 100) / 100).toFixed(2);
    }

    let ops = [correct];
    while(ops.length < 3) {
        let offset = (Math.random() > 0.5 ? 0.1 : -0.1);
        let fake = (parseFloat(correct) + offset).toFixed(tipo === 'unidades' ? 0 : (tipo === 'décimas' ? 1 : 2));
        if(!ops.includes(fake) && fake >= 0) ops.push(fake);
    }
    ops.sort(() => Math.random() - 0.5);

    challenge = { text: `Redondea ${num} a las ${tipo}`, correct: correct, options: ops };
    document.getElementById('pregunta').innerText = challenge.text;
    document.getElementById('opciones-texto').innerText = `IZQ: ${ops[0]} | CENTRO: ${ops[1]} | DER: ${ops[2]}`;
    
    resetBall();
}

function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height * 0.88;
    ball.w = 150;
    ball.h = 150;
    gameState = 'IDLE';
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (imagenesCargadas === totalImagenes) initChallenge();
}

function draw() {
    if (imagenesCargadas < totalImagenes) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Dibujar Fondo
    ctx.drawImage(imgFondo, 0, 0, canvas.width, canvas.height);

    // 2. Dibujar Bolos
    xZonasRelativas.forEach((relX, i) => {
        const zx = canvas.width * relX;
        // Si el jugador ha golpeado esta zona, no dibujamos bolos (simula caída)
        if (!(gameState === 'HIT' && ball.targetX === zx)) {
            const boloW = canvas.width * 0.04; // Escala dinámica según pantalla
            const boloH = boloW * 2.2;
            
            // Formación triangular de 3 bolos por opción
            const posiciones = [
                {dx: 0, dy: 0}, 
                {dx: -boloW/2, dy: 10}, 
                {dx: boloW/2, dy: 10}
            ];

            posiciones.forEach(p => {
                ctx.drawImage(imgBolo, zx + p.dx - boloW/2, canvas.height * 0.28 + p.dy, boloW, boloH);
            });
        }
    });

    // 3. Dibujar Bola
    if (gameState !== 'HIT') {
        ctx.drawImage(imgBola, ball.x - ball.w/2, ball.y - ball.h/2, ball.w, ball.h);
    }

    update();
    requestAnimationFrame(draw);
}

function update() {
    if (gameState === 'ROLLING') {
        ball.y -= ball.speedY;
        // Reducción proporcional al movimiento para efecto 3D
        ball.w = Math.max(30, ball.w - 1.1);
        ball.h = Math.max(30, ball.h - 1.1);

        let dx = ball.targetX - ball.x;
        ball.x += dx * 0.06;

        // Límite donde están los bolos
        if (ball.y <= canvas.height * 0.35) {
            const index = xZonasRelativas.map(r => canvas.width * r).indexOf(ball.targetX);
            if (challenge.options[index] == challenge.correct) {
                gameState = 'HIT';
                score += 10;
                document.getElementById('puntos').innerText = `Puntos: ${score}`;
                setTimeout(initChallenge, 1200);
            } else {
                gameState = 'GUTTER';
            }
        }
    }

    if (gameState === 'GUTTER') {
        // La bola se va por el lateral y se hace pequeña
        ball.x += (ball.targetX < canvas.width/2 ? -3 : 3);
        ball.y -= 2;
        ball.w *= 0.98;
        ball.h *= 0.98;
        if (ball.w < 5) {
            alert("¡Oops! El redondeo correcto era: " + challenge.correct);
            initChallenge();
        }
    }
}

function lanzar(e) {
    if (gameState !== 'IDLE') return;
    
    const rect = canvas.getBoundingClientRect();
    const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
    const clickX = clienteX - rect.left;
    
    if (clickX < canvas.width * 0.33) ball.targetX = canvas.width * 0.25;
    else if (clickX > canvas.width * 0.66) ball.targetX = canvas.width * 0.75;
    else ball.targetX = canvas.width * 0.5;

    gameState = 'ROLLING';
}

window.addEventListener('mousedown', lanzar);
window.addEventListener('touchstart', lanzar);
window.addEventListener('resize', resize);

</script>
</body>
</html>
